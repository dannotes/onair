name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/onair dist/
          cp README.md LICENSE dist/
          cd dist
          tar czf ../onair-${{ matrix.target }}.tar.gz onair README.md LICENSE

      - name: Stage artifact (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/onair.exe dist/
          Copy-Item README.md dist/
          Copy-Item LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath onair-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onair-${{ matrix.target }}
          path: onair-${{ matrix.target }}.*

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false

  publish-brew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute version + SHAs
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "arm_mac=$(shasum -a 256 artifacts/onair-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "intel_mac=$(shasum -a 256 artifacts/onair-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux=$(shasum -a 256 artifacts/onair-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-onair
        uses: actions/checkout@v4
        with:
          repository: dannotes/homebrew-onair
          token: ${{ secrets.TAP_TOKEN }}
          path: tap

      - name: Render formula
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/onair.rb <<EOF
          # Auto-generated by github.com/dannotes/onair release workflow.
          # Do not edit by hand — your changes will be overwritten on the next release.
          class Onair < Formula
            desc "Watch Microsoft Teams and turn a Philips WiZ smart bulb red while on a call"
            homepage "https://github.com/dannotes/onair"
            version "${{ steps.meta.outputs.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/dannotes/onair/releases/download/v${{ steps.meta.outputs.version }}/onair-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.meta.outputs.arm_mac }}"
              end
              on_intel do
                url "https://github.com/dannotes/onair/releases/download/v${{ steps.meta.outputs.version }}/onair-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.meta.outputs.intel_mac }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/dannotes/onair/releases/download/v${{ steps.meta.outputs.version }}/onair-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.meta.outputs.linux }}"
              end
            end

            def install
              bin.install "onair"
              doc.install "README.md", "LICENSE"
            end

            def caveats
              <<~CAVEAT
                Onair runs as a foreground daemon and serves a dashboard at:
                    http://localhost:9876

                To run it on login, see the autostart templates at:
                    https://github.com/dannotes/onair/tree/main/dist/autostart
              CAVEAT
            end

            test do
              assert_match "onair #{version}", shell_output("#{bin}/onair --version")
            end
          end
          EOF

      - name: Commit and push to tap
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/onair.rb
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "onair v${{ steps.meta.outputs.version }}"
            git push
          fi

  publish-scoop:
    name: Update Scoop bucket
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute version + SHA
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "win_sha=$(shasum -a 256 artifacts/onair-x86_64-pc-windows-msvc.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout scoop-onair
        uses: actions/checkout@v4
        with:
          repository: dannotes/scoop-onair
          token: ${{ secrets.TAP_TOKEN }}
          path: bucket

      - name: Render manifest
        run: |
          mkdir -p bucket/bucket
          cat > bucket/bucket/onair.json <<EOF
          {
            "_comment": "Auto-generated by github.com/dannotes/onair release workflow. Do not edit by hand.",
            "version": "${{ steps.meta.outputs.version }}",
            "description": "Watch Microsoft Teams and turn a Philips WiZ smart bulb red while you're on a call",
            "homepage": "https://github.com/dannotes/onair",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/dannotes/onair/releases/download/v${{ steps.meta.outputs.version }}/onair-x86_64-pc-windows-msvc.zip",
                "hash": "${{ steps.meta.outputs.win_sha }}"
              }
            },
            "bin": "onair.exe",
            "notes": [
              "onair runs as a foreground daemon and serves a dashboard at http://localhost:9876",
              "To run it on login, see https://github.com/dannotes/onair/tree/main/dist/autostart"
            ],
            "checkver": {
              "github": "https://github.com/dannotes/onair"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/dannotes/onair/releases/download/v\$version/onair-x86_64-pc-windows-msvc.zip"
                }
              }
            }
          }
          EOF

      - name: Commit and push to bucket
        run: |
          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/onair.json
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "onair v${{ steps.meta.outputs.version }}"
            git push
          fi
