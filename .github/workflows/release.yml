name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Silence "Node 20 deprecated" warning by forcing v4 actions onto Node 24.
  # Remove once we've bumped checkout/upload-artifact to a v5 that natively uses Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          # Intel Mac is cross-compiled FROM the Apple Silicon runner. macos-13
          # was retired by GitHub, and macos-latest is ARM-only. clang on macOS
          # supports both targets natively, and rusqlite/bundled compiles cleanly
          # via the cc crate's automatic cross-compile.
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/onair dist/
          cp README.md LICENSE dist/
          cd dist
          tar czf ../onair-${{ matrix.target }}.tar.gz onair README.md LICENSE

      - name: Stage artifact (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/onair.exe dist/
          Copy-Item README.md dist/
          Copy-Item LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath onair-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onair-${{ matrix.target }}
          path: onair-${{ matrix.target }}.*

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false

  publish-brew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute version + SHAs
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "arm_mac=$(shasum -a 256 artifacts/onair-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "intel_mac=$(shasum -a 256 artifacts/onair-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux=$(shasum -a 256 artifacts/onair-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-onair
        uses: actions/checkout@v4
        with:
          repository: dannotes/homebrew-onair
          token: ${{ secrets.TAP_TOKEN }}
          path: tap

      - name: Render formula
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/onair.rb <<EOF
          # Auto-generated by github.com/dannotes/onair release workflow.
          # Do not edit by hand — your changes will be overwritten on the next release.
          class Onair < Formula
            desc "Watch Microsoft Teams and turn a Philips WiZ smart bulb red while on a call"
            homepage "https://github.com/dannotes/onair"
            version "${{ steps.meta.outputs.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/dannotes/onair/releases/download/v${{ steps.meta.outputs.version }}/onair-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.meta.outputs.arm_mac }}"
              end
              on_intel do
                url "https://github.com/dannotes/onair/releases/download/v${{ steps.meta.outputs.version }}/onair-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.meta.outputs.intel_mac }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/dannotes/onair/releases/download/v${{ steps.meta.outputs.version }}/onair-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.meta.outputs.linux }}"
              end
            end

            def install
              bin.install "onair"
              doc.install "README.md", "LICENSE"
            end

            def post_install
              # If the user enabled "Run on Login", the daemon is running under
              # launchd with KeepAlive=true and has the old binary mmap'd. brew
              # has just repointed the symlink at the new Cellar version, but the
              # live process keeps serving stale code. Bounce it via launchctl
              # kickstart -k: SIGTERM the old process, let KeepAlive respawn it
              # from the plist, which now resolves to the new binary. Silent
              # no-op when autostart isn't installed.
              return unless OS.mac?
              uid = Process.uid
              quiet_system "/bin/launchctl", "kickstart", "-k", "gui/#{uid}/com.dannotes.onair"
            end

            def caveats
              <<~CAVEAT
                Run onair to launch the dashboard:
                    onair

                The dashboard at http://localhost:9876 will open in your browser
                automatically the first time. Configure your bulb there, then
                toggle "Run on Login" in Settings → Advanced if you want it to
                start on every login.

                Config and call history live at:
                    ~/Library/Application Support/Onair/onair.db
              CAVEAT
            end

            test do
              assert_match "onair #{version}", shell_output("#{bin}/onair --version")
            end
          end
          EOF

      - name: Commit and push to tap
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/onair.rb
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "onair v${{ steps.meta.outputs.version }}"
            git push
          fi

  publish-scoop:
    name: Update Scoop bucket
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute version + SHA
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "win_sha=$(shasum -a 256 artifacts/onair-x86_64-pc-windows-msvc.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout scoop-onair
        uses: actions/checkout@v4
        with:
          repository: dannotes/scoop-onair
          token: ${{ secrets.TAP_TOKEN }}
          path: bucket

      - name: Render manifest
        run: |
          mkdir -p bucket/bucket
          cat > bucket/bucket/onair.json <<EOF
          {
            "_comment": "Auto-generated by github.com/dannotes/onair release workflow. Do not edit by hand.",
            "version": "${{ steps.meta.outputs.version }}",
            "description": "Watch Microsoft Teams and turn a Philips WiZ smart bulb red while you're on a call",
            "homepage": "https://github.com/dannotes/onair",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/dannotes/onair/releases/download/v${{ steps.meta.outputs.version }}/onair-x86_64-pc-windows-msvc.zip",
                "hash": "${{ steps.meta.outputs.win_sha }}"
              }
            },
            "bin": "onair.exe",
            "pre_install": [
              "Get-Process onair -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue",
              "Start-Sleep -Milliseconds 500"
            ],
            "pre_uninstall": [
              "Get-Process onair -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue",
              "Start-Sleep -Milliseconds 500"
            ],
            "post_install": [
              "\$startup = [Environment]::GetFolderPath('Startup')",
              "if (Test-Path (Join-Path \$startup 'onair.lnk')) { Start-Process -FilePath (Join-Path \$dir 'onair.exe') -WindowStyle Hidden }"
            ],
            "notes": [
              "Run 'onair' to launch the dashboard. It will open in your browser automatically the first time.",
              "Configure your bulb there, then toggle 'Run on Login' in Settings -> Advanced if you want it to start on every login."
            ],
            "checkver": {
              "github": "https://github.com/dannotes/onair"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/dannotes/onair/releases/download/v\$version/onair-x86_64-pc-windows-msvc.zip"
                }
              }
            }
          }
          EOF

      - name: Commit and push to bucket
        run: |
          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/onair.json
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "onair v${{ steps.meta.outputs.version }}"
            git push
          fi
